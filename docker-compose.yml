version: '3.8'

services:
  # Laravel Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_NAME: "Conectatec Backend"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${BACKEND_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-tienda_sistema}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1307}
      FILESYSTEM_DISK: public
    volumes:
      - backend-storage:/var/www/storage/app/public
    depends_on:
      - db
    ports:
      - "8000:80"

  # Nuxt Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tienda_sistema}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1307}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  backend-storage:
  pgdata:
